# Session-state encryption key for the traefik-oidc-auth plugin. Shared
# across all kanidm-oidc Middlewares (media, observability, longhorn-system)
# so any traefik-admin replica can decrypt the auth-flow state cookie
# produced by any other replica. Without this, each pod uses a random
# default key and cross-pod requests fail with "Failed to exchange auth
# code". Rotate by editing the value and committing — stakater/reloader
# annotation on traefik-admin rolls the pods.
