---
# traefik-admin — fronts LAN-only operator UIs (Longhorn, Grafana, etc.).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-admin
spec:
  chart:
    spec:
      chart: traefik
      version: 39.0.8
      sourceRef:
        kind: HelmRepository
        name: traefik
  # traefik-admin owns the Traefik CRDs (chart bundles them as templates).
  # The other two instances Skip CRD management and depend on this one so
  # they install after CRDs are present.
  interval: 1h
  values:
    fullnameOverride: traefik-admin
    deployment:
      replicas: 2
    providers:
      kubernetesGateway:
        enabled: true
        labelSelector: homelab.kelch.io/gateway-role=admin
      kubernetesIngress:
        enabled: false
      # Enabled (admin instance only) so Gateway API HTTPRoute ExtensionRef
      # filters can resolve to traefik.io/Middleware (e.g. BasicAuth on
      # Longhorn UI). The other two Traefik instances keep this off — they
      # have no Middleware-protected routes.
      kubernetesCRD:
        enabled: true
        # HTTPRoutes in `media/` reference Middleware kanidm-oidc in `network/`
        # via ExtensionRef.
        allowCrossNamespace: true
    gateway:
      enabled: false
    gatewayClass:
      enabled: false
    service:
      enabled: true
      type: LoadBalancer
      labels:
        lb-pool: admin-prod
      annotations:
        lbipam.cilium.io/ips: 10.32.130.1
      spec:
        externalTrafficPolicy: Cluster
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
    metrics:
      prometheus:
        enabled: true
        # Skip the chart's `.Capabilities.APIVersions.Has
        # "monitoring.coreos.com/v1"` guard. On the live cluster the CRD is
        # supplied by kube-prometheus-stack, but flux-local renders charts
        # offline with no cluster context, so the guard's `fail` aborts the
        # render and breaks PR CI. This setting is the chart's documented
        # escape hatch (traefik/traefik-helm-chart PR #769, issue #679).
        disableAPICheck: true
        serviceMonitor:
          enabled: true
          namespace: network
    logs:
      general:
        level: INFO
      access:
        enabled: true

    # OIDC RP plugin loaded via yaegi. The kanidm-oidc Middleware references
    # this plugin name. Plugin failure mode: load error fails traefik-admin
    # startup — pin via Renovate, never auto-merge bumps.
    experimental:
      plugins:
        traefik-oidc-auth:
          moduleName: github.com/sevensolutions/traefik-oidc-auth
          # renovate: datasource=github-releases depName=sevensolutions/traefik-oidc-auth
          version: v0.19.0

    # CLIENT_SECRET key from the kaniop-emitted Secret, renamed so a future
    # second OIDC client wouldn't collide on the env var name.
    env:
      - name: ARR_SUITE_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: arr-suite-kanidm-oauth2-credentials
            key: CLIENT_SECRET
