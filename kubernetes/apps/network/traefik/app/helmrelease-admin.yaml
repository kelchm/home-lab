---
# traefik-admin — fronts LAN-only operator UIs (Longhorn, Grafana, etc.).
# LoadBalancer at 10.32.30.30, the primary admin pool LB IP.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-admin
spec:
  chart:
    spec:
      chart: traefik
      version: 39.0.8
      sourceRef:
        kind: HelmRepository
        name: traefik
  # traefik-admin owns the Traefik CRDs (chart bundles them as templates).
  # The other two instances Skip CRD management and depend on this one so
  # they install after CRDs are present.
  interval: 1h
  values:
    fullnameOverride: traefik-admin
    deployment:
      replicas: 2
    providers:
      kubernetesGateway:
        enabled: true
        labelSelector: homelab.kelch.io/gateway-role=admin
      kubernetesIngress:
        enabled: false
      # Enabled (admin instance only) so Gateway API HTTPRoute ExtensionRef
      # filters can resolve to traefik.io/Middleware (e.g. BasicAuth on
      # Longhorn UI). The other two Traefik instances keep this off — they
      # have no Middleware-protected routes.
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: false
    gateway:
      enabled: false
    gatewayClass:
      enabled: false
    service:
      enabled: true
      type: LoadBalancer
      labels:
        lb-pool: admin
      annotations:
        lbipam.cilium.io/ips: 10.32.30.30
      spec:
        externalTrafficPolicy: Cluster
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
    metrics:
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true
          namespace: network
    logs:
      general:
        level: INFO
      access:
        enabled: true
