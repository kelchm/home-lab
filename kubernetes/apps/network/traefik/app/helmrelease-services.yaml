---
# traefik-services — fronts LAN household-facing apps (DMZ pattern).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-services
spec:
  chart:
    spec:
      chart: traefik
      version: 39.0.8
      sourceRef:
        kind: HelmRepository
        name: traefik
  dependsOn:
    - name: traefik-admin   # admin instance owns the CRDs
  install:
    crds: Skip
  upgrade:
    crds: Skip
  interval: 1h
  values:
    fullnameOverride: traefik-services
    deployment:
      replicas: 2
    providers:
      kubernetesGateway:
        enabled: true
        labelSelector: homelab.kelch.io/gateway-role=services
      kubernetesIngress:
        enabled: false
      kubernetesCRD:
        enabled: false
    gateway:
      enabled: false
    gatewayClass:
      enabled: false
    service:
      enabled: true
      type: LoadBalancer
      labels:
        lb-pool: services-prod
      annotations:
        lbipam.cilium.io/ips: 10.32.140.1
      spec:
        externalTrafficPolicy: Cluster
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
    metrics:
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true
          namespace: network
    logs:
      general:
        level: INFO
      access:
        enabled: true
