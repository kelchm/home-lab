---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kanidm
spec:
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
    - name: longhorn
      namespace: longhorn-system
  interval: 1h
  path: ./kubernetes/apps/auth/kanidm/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: auth
  # wait:false because the seed Job sits Failed until the operator
  # populates kanidm-bootstrap with real recovered passwords. See
  # docs/runbooks/kanidm-bootstrap.md. Other Kanidm resources still
  # reconcile and become Ready independently.
  wait: false
