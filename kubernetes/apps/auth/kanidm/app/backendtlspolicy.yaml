---
# Tells Traefik to talk HTTPS to the kanidm Service backend and validate the
# cert against the public Let's Encrypt chain (the cert presented by the pod
# is the same auth.home.kelch.io cert the gateway terminates with). Without
# this, Traefik connects in plaintext and Kanidm rejects the request because
# its bindaddress is HTTPS-only.
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: kanidm
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: kanidm
      sectionName: https
  validation:
    hostname: auth.home.kelch.io
    wellKnownCACertificates: System
