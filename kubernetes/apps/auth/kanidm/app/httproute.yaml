---
# Routes auth.home.kelch.io -> kanidm Service (HTTPS backend, validated by
# BackendTLSPolicy). Lives on gateway-services so housemates on streaming
# VLANs can complete OIDC redirects from Jellyseerr; gateway-admin (VLAN-10
# only) can also reach this hostname since the cert + DNS path are shared.
#
# No auth Middleware attached — Kanidm is the auth source itself; gating it
# would create a chicken-and-egg.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kanidm
spec:
  hostnames: ["auth.home.kelch.io"]
  parentRefs:
    - name: gateway-services
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: kanidm
          port: 8443
