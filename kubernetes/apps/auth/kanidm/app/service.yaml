---
# Headless Service: gives every replica a stable DNS name of the form
# `kanidm-<ordinal>.kanidm-headless.auth.svc.cluster.local`. Required by the
# StatefulSet's `serviceName` and load-bearing for PR 5's replication peer
# config (each peer references the others via this DNS name).
apiVersion: v1
kind: Service
metadata:
  name: kanidm-headless
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: kanidm
  ports:
    - name: https
      port: 8443
      targetPort: https
      appProtocol: https
    - name: ldaps
      port: 3636
      targetPort: ldaps
      appProtocol: ldaps
    - name: replication
      port: 8444
      targetPort: replication
---
# ClusterIP Service: front door for HTTPRoute (HTTPS) and any in-cluster
# OIDC RP (Jellyseerr) or LDAPS client (Jellyfin SSO plugin). Round-robins
# across replicas at the kube-proxy level — fine for OIDC because the
# replicated DB is the source of truth and any replica can serve any flow.
apiVersion: v1
kind: Service
metadata:
  name: kanidm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kanidm
  ports:
    - name: https
      port: 8443
      targetPort: https
      appProtocol: https
    - name: ldaps
      port: 3636
      targetPort: ldaps
      appProtocol: ldaps
