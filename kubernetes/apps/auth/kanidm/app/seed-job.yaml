---
# Idempotent Kanidm seed Job. Runs after the operator has populated the
# kanidm-bootstrap Secret with real passwords (see
# docs/runbooks/kanidm-bootstrap.md). Re-running is safe — every command
# checks for existence first.
#
# Once successful, the Job's pods self-clean via ttlSecondsAfterFinished.
# To re-run after editing this manifest, delete the Job:
#   kubectl -n auth delete job kanidm-seed
# and Flux will re-create it on next reconcile.
apiVersion: batch/v1
kind: Job
metadata:
  name: kanidm-seed
  annotations:
    # Roll a new Job whenever the bootstrap Secret changes. Reloader watches
    # the referenced Secret name; on change it triggers re-creation.
    secret.reloader.stakater.com/reload: kanidm-bootstrap
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kanidm-seed
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seed
          image: docker.io/kanidm/tools:1.10.1
          imagePullPolicy: IfNotPresent
          env:
            - name: KANIDM_URL
              value: https://auth.home.kelch.io
            - name: KANIDM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kanidm-bootstrap
                  key: idm_admin_password
            # Writable cache dir for the kanidm CLI's session token.
            - { name: HOME,                   value: /tmp }
            - { name: KANIDM_TOKEN_CACHE_PATH, value: /tmp/kanidm_tokens }
          command: [/bin/sh, -c]
          args:
            - |
              set -eu

              # Login as idm_admin via stdin (KANIDM_PASSWORD is also read
              # by the CLI when stdin isn't a TTY; both paths work).
              echo "$KANIDM_PASSWORD" | kanidm login --name idm_admin

              # ---- Group: arr-admins -------------------------------------
              if ! kanidm group get arr-admins --name idm_admin >/dev/null 2>&1; then
                kanidm group create arr-admins --name idm_admin
              fi

              # ---- Person: operator --------------------------------------
              if ! kanidm person get operator --name idm_admin >/dev/null 2>&1; then
                kanidm person create operator "Operator" --name idm_admin
              fi
              kanidm group add-members arr-admins operator --name idm_admin

              # ---- OAuth2: arr-suite -------------------------------------
              # Used by traefik-oidc-auth in PR 6. Per-app *.home.kelch.io
              # redirect URLs get added by each consumer's PR (Kanidm
              # rejects wildcard redirect_uri values per OIDC spec).
              if ! kanidm system oauth2 get arr-suite --name idm_admin >/dev/null 2>&1; then
                kanidm system oauth2 create arr-suite "Arr Admin Suite" "https://home.kelch.io" --name idm_admin
              fi
              kanidm system oauth2 update-scope-map arr-suite arr-admins openid profile email groups --name idm_admin

              # ---- OAuth2: jellyseerr ------------------------------------
              # Jellyseerr is OIDC-aware natively (no Traefik plugin in
              # front). Redirect URL added by Jellyseerr's PR.
              if ! kanidm system oauth2 get jellyseerr --name idm_admin >/dev/null 2>&1; then
                kanidm system oauth2 create jellyseerr "Jellyseerr" "https://jellyseerr.home.kelch.io" --name idm_admin
              fi
              kanidm system oauth2 update-scope-map jellyseerr arr-admins openid profile email groups --name idm_admin

              echo
              echo "Seed complete. Capture client secrets for downstream consumers:"
              echo "  kanidm system oauth2 show-basic-secret arr-suite --name idm_admin"
              echo "  kanidm system oauth2 show-basic-secret jellyseerr --name idm_admin"
          resources:
            requests: { cpu: 10m,  memory: 32Mi }
            limits:   { memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # /tmp writable for token cache
            capabilities: { drop: [ALL] }
