---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kanidm
spec:
  # PR 3 ships this at 1 replica — a single canonical Kanidm instance, no
  # replication topology. PR 5 scales to 3 + bootstraps the peer mesh.
  # Pod anti-affinity below is forward-compatible with the scale-out.
  replicas: 1
  serviceName: kanidm-headless
  podManagementPolicy: Parallel    # for HA: drain one, the others keep serving
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kanidm
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn
        resources:
          requests:
            storage: 2Gi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kanidm
      annotations:
        # Roll the StatefulSet when kanidm-server-config or the cert Secret
        # change. Required because /data/server.toml is a subPath mount, and
        # subPath mounts do NOT propagate ConfigMap updates into running pods.
        # Reloader is already deployed cluster-wide (kube-system/reloader).
        reloader.stakater.com/auto: "true"
    spec:
      affinity:
        podAntiAffinity:
          # `required` so PR 5's scale-up to 3 lands one pod per node. At 1
          # replica today this is a no-op but it pins the topology contract.
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: kanidm
      securityContext:
        # Image runs as root by design — kanidm/server needs UID 0 at
        # startup to chown /data and bind sub-1024 ports under some configs.
        # The KittyKatt chart deliberately omits runAsNonRoot for the same
        # reason. Container-level capabilities are still dropped to ALL
        # below; PR 8 hardening can revisit forcing a non-root UID once the
        # binary's actual filesystem-init expectations are mapped out.
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kanidm
          image: docker.io/kanidm/server:1.10.1
          imagePullPolicy: IfNotPresent
          # No `command` override — the image's ENTRYPOINT looks for
          # /data/server.toml by default, which is exactly where the
          # ConfigMap is mounted via subPath below.
          ports:
            - { name: https, containerPort: 8443, protocol: TCP }
            - { name: ldaps, containerPort: 3636, protocol: TCP }
            - { name: replication, containerPort: 8444, protocol: TCP }
          livenessProbe:
            httpGet:
              path: /status
              port: https
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /status
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 100Mi
            limits:
              memory: 500Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              # Match upstream KittyKatt chart: kanidmd's Argon2id workers,
              # ownership management on /data, and non-privileged port-bind
              # need these specific caps when the image runs as non-root.
              drop: [ALL]
              add: [NET_BIND_SERVICE, CHOWN, SETUID, SETGID, FOWNER, DAC_OVERRIDE]
          volumeMounts:
            - { name: data,   mountPath: /data }
            - { name: certs,  mountPath: /certs, readOnly: true }
            - { name: config, mountPath: /data/server.toml, subPath: server.toml, readOnly: true }
      volumes:
        - name: certs
          secret:
            secretName: auth-home-kelch-io-tls
            # No defaultMode override — K8s default of 0644 lets the
            # non-root container user read tls.crt/tls.key. Tightening to
            # 0400 with root ownership would lock the kanidm process out.
        - name: config
          configMap:
            name: kanidm-server-config
            items:
              - { key: server.toml, path: server.toml }
