---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-metrics-k8s-stack
spec:
  dependsOn:
    - name: kube-prometheus-stack   # we reuse KPS's KSM, node-exporter, Alertmanager, prometheus-operator CRDs
    - name: bakeoff-ui-auth         # HTTPRoutes reference the shared Traefik Middleware
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: victoria-metrics-k8s-stack
      namespace: observability
  interval: 1h
  path: ./kubernetes/apps/observability/victoria-metrics-k8s-stack/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
