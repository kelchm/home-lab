---
# Routes grafana.home.kelch.io to the standalone Grafana UI. Attached to
# gateway-admin (LAN-only, *.home.kelch.io cert). Grafana has its own
# login UI fed by the grafana-admin Secret.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
spec:
  hostnames: ["grafana.home.kelch.io"]
  parentRefs:
    - name: gateway-admin
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: grafana
          port: 80
