---
# Standalone Grafana — explicitly decoupled from any single observability
# backend. Both bake-off pipelines (KPS+Loki and VM+VL) register their
# datasources and dashboards as labeled ConfigMaps that the sidecars
# auto-mount. Grafana's lifecycle is independent of either stack: tearing
# down the bake-off loser leaves Grafana state and dashboards untouched,
# we just drop that stack's datasource ConfigMap.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
spec:
  chart:
    spec:
      chart: grafana
      version: 10.5.15
      sourceRef:
        kind: HelmRepository
        name: grafana
  interval: 1h
  values:
    replicas: 1

    # Break-glass local admin. Kanidm lives in this same cluster — if it's
    # down, we still need a way into Grafana to diagnose. The OIDC button
    # is the everyday path (auto_login=true below); /login?disableAutoLogin=true
    # falls back to this credential.
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password

    # client_secret is rotated by kaniop into grafana-kanidm-oauth2-credentials
    # (see oauth2-client.yaml). Stakater reloader restarts the Deployment on
    # rotation so the env-from-Secret value propagates to the running pod.
    deploymentAnnotations:
      secret.reloader.stakater.com/reload: grafana-kanidm-oauth2-credentials

    envValueFrom:
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
        secretKeyRef:
          name: grafana-kanidm-oauth2-credentials
          key: CLIENT_SECRET

    persistence:
      enabled: true
      type: pvc
      size: 10Gi
      storageClassName: longhorn

    # RWO PVC + the chart's default maxSurge=25% deadlocks every upgrade:
    # the new pod can't attach the volume while the old pod still holds
    # it. maxSurge=0 forces the old pod to terminate before the new one
    # starts; maxUnavailable=1 permits the brief gap where the single
    # replica is down. Functionally equivalent to type=Recreate, but
    # type=Recreate trips a chart rendering bug (rollingUpdate field
    # leaks through and the API rejects the Deployment).
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1

    service:
      type: ClusterIP

    ingress:
      enabled: false   # we use Gateway API HTTPRoute

    # Pre-installed for commits 4/5 so adding the VM-stack datasources
    # later doesn't require a Grafana restart cycle.
    plugins:
      - victoriametrics-metrics-datasource
      - victoriametrics-logs-datasource

    # Sidecars discover datasources/dashboards by ConfigMap label. Each
    # subsequent bake-off commit lands labeled ConfigMaps; Grafana picks
    # them up on the next sidecar poll without further chart changes.
    sidecar:
      datasources:
        enabled: true
        label: grafana_datasource
        labelValue: "1"
        searchNamespace: observability
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        # ALL so charts that ship dashboards in their own namespace
        # (kaniop in identity, cilium in kube-system) get picked up.
        # Chart auto-grants the sidecar a ClusterRole when set to ALL.
        searchNamespace: ALL
        folderAnnotation: grafana_folder
        provider:
          foldersFromFilesStructure: true

    grafana.ini:
      server:
        root_url: https://grafana.home.kelch.io
      analytics:
        check_for_updates: false
        reporting_enabled: false
      log:
        mode: console
      auth.generic_oauth:
        enabled: true
        name: Kanidm
        icon: signin
        # scopeMap on the KanidmOAuth2Client restricts the flow to
        # ops-admins, so first-login auto-provision only creates accounts
        # for users kanidm has already vetted.
        allow_sign_up: true
        # Land users in the OIDC flow on /login. Break-glass admin uses
        # /login?disableAutoLogin=true to reach the local form.
        auto_login: true
        client_id: grafana
        # client_secret comes from GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET env.
        scopes: openid profile email groups
        auth_url: https://auth.home.kelch.io/ui/oauth2
        token_url: https://auth.home.kelch.io/oauth2/token
        api_url: https://auth.home.kelch.io/oauth2/openid/grafana/userinfo
        use_pkce: true
        # ops-admins → Admin. contains() form keeps role mapping working
        # if a future scopeMap adds a read-only group.
        role_attribute_path: contains(groups[*], 'ops-admins@auth.home.kelch.io') && 'Admin' || 'Viewer'

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi
