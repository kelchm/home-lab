---
# Dedicated OIDC client for Grafana's native generic_oauth flow. Distinct
# from ops-suite (which is the forward-auth client for Prometheus/VM/etc.
# via traefik-oidc-auth) so the scopeMap and redirect URL stay scoped to
# this app.
#
# kaniop emits the client_secret into `grafana-kanidm-oauth2-credentials`
# in this namespace, which the Grafana Deployment mounts as
# GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET.
apiVersion: kaniop.rs/v1beta1
kind: KanidmOAuth2Client
metadata:
  name: grafana
spec:
  kanidmRef:
    name: kanidm
    namespace: identity
  displayname: Grafana
  # Portal tile icon — kaniop downloads this and sets it in kanidm.
  image:
    url: https://raw.githubusercontent.com/kelchm/home-lab/main/kubernetes/apps/identity/kanidm/app/portal-icons/grafana.svg
  origin: https://grafana.home.kelch.io
  redirectUrl:
    - https://grafana.home.kelch.io/login/generic_oauth
  scopeMap:
    - group: ops-admins
      scopes:
        - openid
        - profile
        - email
        - groups
