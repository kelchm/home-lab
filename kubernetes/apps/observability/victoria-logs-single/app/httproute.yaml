---
# VictoriaLogs UI — native LogsQL browser with log streaming view.
# Loki has no equivalent native UI (Grafana Explore is the only path),
# which is itself a comparison data point.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vlogs
spec:
  hostnames: ["vlogs.home.kelch.io"]
  parentRefs:
    - name: gateway-admin
      namespace: network
      sectionName: https
  rules:
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: bakeoff-ui-auth
      backendRefs:
        - name: victoria-logs-single-server
          port: 9428
