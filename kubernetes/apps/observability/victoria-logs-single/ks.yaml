---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-logs-single
spec:
  dependsOn:
    - name: victoria-metrics-k8s-stack   # reuses the victoriametrics HelmRepository
    - name: bakeoff-ui-auth              # HTTPRoute references the shared Traefik Middleware
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: victoria-logs-single
      namespace: observability
  interval: 1h
  path: ./kubernetes/apps/observability/victoria-logs-single/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
