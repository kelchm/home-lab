---
# OpenObserve standalone — single-instance unified observability
# (metrics + logs + traces). Local-mode storage on Longhorn-backed PVC.
# Built-in user auth, root credentials supplied via the openobserve-root
# Secret (sops-encrypted in this directory).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openobserve
spec:
  chart:
    spec:
      chart: openobserve-standalone
      version: 0.70.4
      sourceRef:
        kind: HelmRepository
        name: openobserve
  interval: 1h
  values:
    auth:
      existingRootUserSecret:
        name: openobserve-root
        emailKey: ZO_ROOT_USER_EMAIL
        passwordKey: ZO_ROOT_USER_PASSWORD
    persistence:
      enabled: true
      size: 50Gi
      storageClass: longhorn
    config:
      ZO_APP_NAME: openobserve
      ZO_LOCAL_MODE: "true"
      ZO_LOCAL_MODE_STORAGE: disk
      ZO_HTTP_PORT: "5080"
      # Reasonable retention / chunking for homelab scale.
      ZO_TELEMETRY: "false"   # opt out of upstream usage telemetry
    service:
      type: ClusterIP
      http_port: 5080
      grpc_port: 5081
    ingress:
      enabled: false   # we use Gateway API HTTPRoute
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
