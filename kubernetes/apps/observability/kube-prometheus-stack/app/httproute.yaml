---
# Prometheus UI — gated by BasicAuth via the shared bakeoff-ui-auth
# Middleware (see kubernetes/apps/observability/bakeoff-ui-auth/).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
spec:
  hostnames: ["prometheus.home.kelch.io"]
  parentRefs:
    - name: gateway-admin
      namespace: network
      sectionName: https
  rules:
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: bakeoff-ui-auth
      backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090
---
# Alertmanager UI — also the single AM showing alerts from BOTH stacks
# (vmalert points here too, see victoria-metrics-k8s-stack values).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
spec:
  hostnames: ["alertmanager.home.kelch.io"]
  parentRefs:
    - name: gateway-admin
      namespace: network
      sectionName: https
  rules:
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: bakeoff-ui-auth
      backendRefs:
        - name: kube-prometheus-stack-alertmanager
          port: 9093
