---
# Alloy — log collector DaemonSet for the bake-off. Pipeline A's log
# ingest path. Tails pod logs from /var/log/pods on each node and ships
# them to Loki via the Loki ingestion API.
#
# Commit 5 will extend this config to dual-write to VictoriaLogs in
# parallel — VL accepts the Loki ingestion API natively, so a single
# Alloy with two `loki.write` sinks gives both backends byte-identical
# input. The comparison stays purely about the storage/query layer.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  chart:
    spec:
      chart: alloy
      version: 1.10.0
      sourceRef:
        kind: HelmRepository
        name: grafana
  interval: 1h
  values:
    controller:
      type: daemonset
      hostPID: false
      # Chart doesn't checksum the config ConfigMap into the pod template,
      # so HelmRelease upgrades change the mounted config without rolling
      # the pods. Stakater reloader watches the ConfigMap and triggers
      # the rollout.
      extraAnnotations:
        configmap.reloader.stakater.com/reload: alloy
      volumes:
        # Persist Alloy's storage dir (positions file, WAL) across pod
        # restarts. Without this, every restart re-reads every pod log from
        # the start and Loki rejects the >7d portion en masse.
        extra:
          - name: alloy-data
            hostPath:
              path: /var/lib/alloy
              type: DirectoryOrCreate

    alloy:
      storagePath: /var/lib/alloy
      mounts:
        varlog: true   # mount /var/log on the host so we can tail pod logs
        extra:
          - name: alloy-data
            mountPath: /var/lib/alloy

      configMap:
        create: true
        content: |
          // Discover pods, then keep only this node's via the relabel below.
          // Node-scoping is required for correctness: with the full cluster
          // pod list, local.file_match mis-correlates the bloated target set
          // against the few log files present on the node and attaches one
          // pod's file to another pod's labels.
          discovery.kubernetes "pods" {
            role = "pod"
          }

          // Map Kubernetes metadata to Loki labels and compute the log
          // file path on disk.
          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pods.targets

            // Keep only pods on this node. K8S_NODE_NAME is injected by the
            // chart from spec.nodeName.
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              regex         = sys.env("K8S_NODE_NAME")
              action        = "keep"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
            // Path the on-disk log files by namespace/pod/container. Static
            // pods (kube-apiserver, etc.) use the kubelet's config-hash on
            // disk instead of the API's pod UID, so the trailing _* wildcard
            // matches both shapes.
            rule {
              source_labels = [
                "__meta_kubernetes_namespace",
                "__meta_kubernetes_pod_name",
                "__meta_kubernetes_pod_container_name",
              ]
              separator    = "/"
              action       = "replace"
              regex        = "(.+)/(.+)/(.+)"
              replacement  = "/var/log/pods/$1_$2_*/$3/*.log"
              target_label = "__path__"
            }
          }

          // Tail logs from /var/log/pods by file pattern.
          local.file_match "pod_logs" {
            path_targets = discovery.relabel.pod_logs.output
            sync_period  = "10s"
          }

          loki.source.file "pod_logs" {
            targets    = local.file_match.pod_logs.targets
            forward_to = [loki.process.pod_logs.receiver]
          }

          // Decode CRI log format (Talos uses containerd) and fan out
          // to both log backends. Same parsed events, same labels,
          // byte-identical input on each — the bake-off comparison is
          // purely about the storage/query layer downstream.
          loki.process "pod_logs" {
            stage.cri {}
            forward_to = [
              loki.write.loki.receiver,
              loki.write.vl.receiver,
            ]
          }

          loki.write "loki" {
            endpoint {
              url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
            }
          }

          // VictoriaLogs accepts the Loki HTTP ingestion API natively
          // at /insert/loki/api/v1/push. Stream labels (namespace, pod,
          // container, node) come through as VL stream fields with no
          // additional config needed.
          loki.write "vl" {
            endpoint {
              url = "http://victoria-logs-single-server.observability.svc.cluster.local:9428/insert/loki/api/v1/push"
            }
          }

    serviceMonitor:
      enabled: true   # let KPS Prometheus scrape Alloy itself
