---
# Loki — Pipeline A's log backend. Single-binary mode is the right shape
# for homelab scale: no microservices sharding, no separate ingester /
# distributor / querier roles. Filesystem chunk store on Longhorn — never
# NFS (Loki + NFS has known locking pitfalls). When/if Loki wins the
# bake-off and we want longer retention, the migration target is MinIO
# on the Synology (S3-compatible), which Loki actually prefers.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  chart:
    spec:
      chart: loki
      version: 7.0.0
      sourceRef:
        kind: HelmRepository
        name: grafana
  interval: 1h
  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      pattern_ingester:
        enabled: true
      limits_config:
        retention_period: 720h   # 30 days
        allow_structured_metadata: true
        volume_enabled: true
      compactor:
        retention_enabled: true
        delete_request_store: filesystem

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 30Gi
        storageClass: longhorn
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi

    # Disable scalable/distributed components — not used in SingleBinary mode.
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    gateway:
      enabled: false
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    test:
      enabled: false
    lokiCanary:
      enabled: false

    monitoring:
      serviceMonitor:
        enabled: true     # let KPS Prometheus scrape Loki itself
      dashboards:
        enabled: true     # publish Loki ops dashboards as ConfigMaps
      rules:
        enabled: false    # don't ship default Loki rules during the bake-off
      selfMonitoring:
        enabled: false    # avoid log loops; Alloy ships our pod logs anyway
      lokiCanary:
        enabled: false
