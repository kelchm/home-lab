---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-operator
spec:
  chartRef:
    kind: OCIRepository
    name: cnpg-operator
  interval: 1h
  values:
    # PodMonitor → kube-prometheus-stack picks up operator metrics. CR-level
    # PodMonitors for individual Clusters are still controlled per-Cluster via
    # spec.monitoring.enablePodMonitor.
    monitoring:
      podMonitorEnabled: true
