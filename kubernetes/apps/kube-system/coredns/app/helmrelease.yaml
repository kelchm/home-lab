---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns
spec:
  chartRef:
    kind: OCIRepository
    name: coredns
  interval: 1h
  values:
    fullnameOverride: coredns
    image:
      repository: mirror.gcr.io/coredns/coredns
    k8sAppLabelOverride: kube-dns
    serviceAccount:
      create: true
    service:
      name: kube-dns
      clusterIP: "10.43.0.10"
    replicaCount: 2

    servers:
      # Deliberately route the household/internal zone directly to UniFi.
      #
      # UniFi owns some home.kelch.io records directly and conditionally forwards
      # Kubernetes app records to k8s-gateway. This preserves both behaviors while
      # bypassing Talos hostDNS / 169.254.116.108 for this zone.
      #
      # See issue #36 for the SERVFAIL flake that motivated splitting this out.
      # NetworkPolicy note: if a default-deny egress is added to kube-system,
      # an explicit allow rule for 10.32.30.1:53 (UDP+TCP) is required.
      - zones:
          - zone: home.kelch.io
            scheme: dns://
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: forward
            parameters: . 10.32.30.1
          - name: cache
            parameters: 30
            configBlock: |-
              servfail 0
          - name: loop
          - name: log
            configBlock: |-
              class error

      # Default Kubernetes/CoreDNS behavior. Forward is left at the host
      # resolver (Talos hostDNS) so generic external resolution follows the
      # node's configured nameservers. Internal household DNS is handled by
      # the explicit home.kelch.io server block above.
      - zones:
          - zone: .
            scheme: dns://
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |-
              lameduck 5s
          - name: ready
          - name: kubernetes
            parameters: cluster.local in-addr.arpa ip6.arpa
            configBlock: |-
              pods verified
              fallthrough in-addr.arpa ip6.arpa
          - name: autopath
            parameters: "@kubernetes"
          - name: forward
            parameters: . /etc/resolv.conf
          - name: cache
            parameters: 30
            configBlock: |-
              prefetch 20
              servfail 0
          - name: loop
          - name: reload
          - name: loadbalance
          - name: prometheus
            parameters: 0.0.0.0:9153
          - name: log
            configBlock: |-
              class error

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
