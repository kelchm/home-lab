---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
spec:
  chart:
    spec:
      chart: csi-driver-nfs
      version: v4.13.2
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
  interval: 1h
  values:
    # Talos's kubelet root, explicit for clarity (matches Longhorn).
    kubeletDir: /var/lib/kubelet

    driver:
      name: nfs.csi.k8s.io

    # Driver only — no chart-managed StorageClass. The media library is a
    # static PV (kubernetes/apps/media/storage/media-library-pv.yaml) so the
    # share root mounts as-is, not under a per-PVC `pvc-<uid>` subdir.
    # If a future workload needs ad-hoc dynamic NFS scratch volumes, define a
    # StorageClass alongside that workload.
    storageClass:
      create: false

    controller:
      # Lightweight controller; one replica is sufficient. Node DaemonSet
      # provides the per-node mount-path agency that actually matters.
      replicas: 1
      # Override chart default `File` — would chown the entire NFS tree
      # to each pod's fsGroup on every mount.
      fsGroupPolicy: None
