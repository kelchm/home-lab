---
# Admin pool — VLAN 30, infrastructure/admin UIs (k8s-gateway DNS, envoy-external)
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: admin
spec:
  allowFirstLastIPs: "No"
  blocks:
    - start: "10.32.30.200"
      stop: "10.32.30.250"
---
# Services pool — VLAN 40, household-facing services (envoy-internal, DMZ ingress)
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: services
spec:
  allowFirstLastIPs: "No"
  blocks:
    - start: "10.32.40.10"
      stop: "10.32.40.99"
---
# Admin L2 announcement — announces on VLAN 30 primary interface only
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: admin
spec:
  loadBalancerIPs: true
  serviceSelector:
    matchLabels:
      lb-pool: admin
  interfaces:
    - "^eno[0-9]+$"
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
---
# Services L2 announcement — announces on VLAN 40 tagged subinterface only
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: services
spec:
  loadBalancerIPs: true
  serviceSelector:
    matchLabels:
      lb-pool: services
  interfaces:
    - "^eno[0-9]+\\.40$"
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
