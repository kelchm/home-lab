---
# Legacy L2-announced pools — kept as rollback targets after the BGP
# migration. The corresponding CiliumL2AnnouncementPolicy resources were
# removed in step 12; re-add them to roll back. Pools and VLAN 40 are
# removed in step 14 once a stable maintenance window has passed.
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: admin
spec:
  allowFirstLastIPs: "No"
  blocks:
    - start: "10.32.30.30"
      stop: "10.32.30.99"
---
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: services
spec:
  allowFirstLastIPs: "No"
  blocks:
    - start: "10.32.40.30"
      stop: "10.32.40.99"
