---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: generic-device-plugin
spec:
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: generic-device-plugin
      namespace: kube-system
  interval: 1h
  path: ./kubernetes/apps/kube-system/generic-device-plugin/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-system
  wait: true
