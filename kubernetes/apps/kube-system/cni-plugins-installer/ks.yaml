---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cni-plugins-installer
spec:
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: cni-plugins-installer
      namespace: kube-system
  interval: 1h
  path: ./kubernetes/apps/kube-system/cni-plugins-installer/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-system
  wait: true
