---
# LAN-only endpoint at mcpjungle.home.kelch.io via the admin gateway. No
# Cloudflare path, no public DNS — k8s-gateway resolves it internally only.
# mcpjungle is in SERVER_MODE=enterprise, so per-client bearer tokens (minted
# via `mcpjungle init-server` + CLI) are the access boundary; OIDC is not in
# front because MCP clients (Claude Desktop, Claude Code, etc.) can't follow
# the redirect.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcpjungle
spec:
  hostnames: ["mcpjungle.home.kelch.io"]
  parentRefs:
    - name: gateway-admin
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: mcpjungle
          port: 8080
