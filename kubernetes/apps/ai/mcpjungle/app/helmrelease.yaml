---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcpjungle
spec:
  chartRef:
    kind: OCIRepository
    name: mcpjungle
  interval: 1h
  values:
    controllers:
      mcpjungle:
        strategy: Recreate
        containers:
          app:
            image:
              # -stdio variant bundles npx + uvx so stdio-based MCP servers
              # (filesystem, kubernetes, git, etc.) can be registered as
              # subprocesses without standing up separate workloads.
              repository: ghcr.io/mcpjungle/mcpjungle
              tag: 0.4.5-stdio
            env:
              SERVER_MODE: enterprise
              OTEL_ENABLED: "true"
              MCP_SERVER_INIT_REQ_TIMEOUT_SEC: "10"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: mcpjungle-db-app
                    key: uri
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: mcpjungle
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: http
            path: /metrics
