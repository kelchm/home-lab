---
# LAN-only at metamcp.home.kelch.io via the admin gateway. No Cloudflare, no
# public DNS. Web-UI login is OIDC via kanidm (oauth2-client.yaml); MetaMCP is
# then the OAuth provider for MCP clients. LAN-only is the network boundary.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: metamcp
spec:
  hostnames: ["metamcp.home.kelch.io"]
  parentRefs:
    - name: gateway-admin
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: metamcp
          port: 12008
