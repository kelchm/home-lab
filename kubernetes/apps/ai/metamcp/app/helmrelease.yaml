---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metamcp
spec:
  chartRef:
    kind: OCIRepository
    name: metamcp
  interval: 1h
  values:
    controllers:
      metamcp:
        # kaniop rotates the OIDC client_secret into metamcp-kanidm-oauth2-credentials;
        # Reloader restarts the pod so OIDC_CLIENT_SECRET propagates from the Secret.
        annotations:
          secret.reloader.stakater.com/reload: metamcp-kanidm-oauth2-credentials
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/metatool-ai/metamcp
              tag: 2.4.22
            env:
              APP_URL: https://metamcp.home.kelch.io
              NEXT_PUBLIC_APP_URL: https://metamcp.home.kelch.io
              # Docker-Compose hack to rewrite localhost references; meaningless
              # in K8s and would mangle our Service DNS rewrites — keep off.
              TRANSFORM_LOCALHOST_TO_DOCKER_INTERNAL: "false"
              # Entrypoint script blocks on `wait-for-postgres` using these vars
              # directly, independent of DATABASE_URL — defaults are the
              # docker-compose service name `postgres:5432` which doesn't exist
              # here. Point at CNPG's read/write Service.
              POSTGRES_HOST: metamcp-db-rw
              POSTGRES_PORT: "5432"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: metamcp-db-app
                    key: uri
              BETTER_AUTH_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: metamcp-secrets
                    key: BETTER_AUTH_SECRET
              # OIDC SSO for the web UI, federated to kanidm. better-auth derives
              # the callback as ${APP_URL}/api/auth/oauth2/callback/oidc, which must
              # match redirectUrl in oauth2-client.yaml. PKCE: kanidm advertises S256.
              OIDC_CLIENT_ID: metamcp
              OIDC_DISCOVERY_URL: https://auth.home.kelch.io/oauth2/openid/metamcp/.well-known/openid-configuration
              OIDC_AUTHORIZATION_URL: https://auth.home.kelch.io/ui/oauth2
              OIDC_SCOPES: openid email profile
              OIDC_PKCE: "true"
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: metamcp-kanidm-oauth2-credentials
                    key: CLIENT_SECRET
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 12008
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        # Image runs migrations via pnpm which expects to mkdir under $HOME;
        # default $HOME is `/` (root-as-default). UID 1000 can't write there
        # and the migration step crashes.
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: metamcp
        ports:
          http:
            port: *port
