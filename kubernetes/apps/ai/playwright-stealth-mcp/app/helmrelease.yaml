---
# Patchright-backed sibling of playwright-mcp. Reached internally at
# http://playwright-stealth-mcp.ai.svc.cluster.local:8931/mcp. Image is
# built from kelchm/playwright-stealth-mcp — Microsoft's playwright-mcp
# source with playwright/playwright-core swapped to patchright via npm
# aliases. Same args/securityContext as vanilla playwright-mcp.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: playwright-stealth-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: playwright-stealth-mcp
  interval: 1h
  values:
    controllers:
      playwright-stealth-mcp:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/kelchm/playwright-stealth-mcp
              tag: v0.0.75-1
            command: ["node"]
            args:
              - /app/cli.js
              - --headless
              - --browser=chromium
              - --no-sandbox
              - --isolated
              - --host=0.0.0.0
              - --port=8931
              - --allowed-hosts=*
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 8931
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: playwright-stealth-mcp
        ports:
          http:
            port: *port
