---
# In-cluster HTTP MCP server reached by metamcp via Service DNS at
# http://pcbparts-mcp.ai.svc.cluster.local:8080/mcp. Not on any Gateway.
#
# Read-only component search: keyless JLCPCB in-stock DB + EasyEDA footprint
# checks. Complements digikey-mcp with JLCPCB/LCSC pricing and assembly stock.
# Image serves streamable-http at /mcp on 0.0.0.0:8080 with no command override.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pcbparts-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: pcbparts-mcp
  interval: 1h
  values:
    controllers:
      pcbparts-mcp:
        containers:
          app:
            image:
              # No semver tags published; pin the immutable main-<sha>-<date>
              # tag. amd64-only image — all k8s-prod nodes are amd64.
              repository: ghcr.io/averyy/pcbparts-mcp
              tag: main-ed3d4df-20260507
            env:
              # Every client arrives from the single metamcp pod IP, so the
              # per-IP limiter is one global bucket; raise it from the default.
              RATE_LIMIT_REQUESTS: "500"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        # Image USER is appuser (non-numeric); pin numeric UID so kubelet's
        # runAsNonRoot admission check passes pre-start.
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: pcbparts-mcp
        ports:
          http:
            port: *port
