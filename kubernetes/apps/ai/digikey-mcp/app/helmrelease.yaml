---
# In-cluster HTTP MCP server reached by metamcp via Service DNS at
# http://digikey-mcp.ai.svc.cluster.local:8000/mcp. Not on any Gateway.
#
# MyLists tools need 3-legged OAuth — DIGIKEY_REFRESH_TOKEN_SEED is
# consumed once from the Secret on first call, then the rotating refresh
# token is persisted to /data/tokens.json on the PVC. Cache is the source
# of truth thereafter; the seed env var is ignored.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: digikey-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: digikey-mcp
  interval: 1h
  values:
    controllers:
      digikey-mcp:
        # RWO PVC + single replica: old pod must release the volume
        # before the new one attaches.
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/kelchm/digikey-mcp
              tag: 0.1.1
            env:
              DIGIKEY_MCP_TRANSPORT: http
              DIGIKEY_MCP_HOST: 0.0.0.0
              DIGIKEY_MCP_PORT: "8000"
              DIGIKEY_TOKEN_CACHE: /data/tokens.json
            envFrom:
              - secretRef:
                  name: digikey-mcp-secrets
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 8000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        # PVC initialized with this gid so the runtime user can write
        # tokens.json.
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: digikey-mcp
        ports:
          http:
            port: *port
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        # Token cache file is a few hundred bytes; 100Mi is longhorn's
        # effective floor.
        size: 100Mi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /data
