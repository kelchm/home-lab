---
# Default-deny shape: only MCP gateways in the ai namespace reach the
# playwright-mcp HTTP transport. Egress is unrestricted so the headless
# browser can navigate arbitrary sites.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: playwright-mcp
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: playwright-mcp
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: mcpjungle
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: metamcp
      toPorts:
        - ports:
            - port: "8931"
              protocol: TCP
