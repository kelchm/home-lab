---
# Default-deny shape: only MCP gateways in the ai namespace reach the
# grafana-mcp HTTP transport. Egress is unrestricted so the server can resolve
# DNS and reach the Grafana API cross-namespace in observability.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: grafana-mcp
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana-mcp
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: metamcp
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
