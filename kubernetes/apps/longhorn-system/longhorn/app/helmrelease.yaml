---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  chart:
    spec:
      chart: longhorn
      version: 1.11.1
      sourceRef:
        kind: HelmRepository
        name: longhorn
  interval: 1h
  values:
    # Attach longhorn-manager pods to the storage-network NAD so the
    # BackupTarget controller's NFS mount sources from a .128/28 IP and
    # reaches the NAS over VLAN 25. The chart's `storageNetwork` setting
    # (set below) only annotates instance-manager / backing-image-manager /
    # backing-image-data-source pods — manager is excluded upstream.
    annotations:
      k8s.v1.cni.cncf.io/networks: longhorn-system/storage-network

    # Disable the upgrade-checker job — incompatible with GitOps reconciliation
    # because it expects to run interactively and gates the chart's apply on
    # its own progress. Same reasoning the chart README gives for Argo CD users.
    preUpgradeChecker:
      jobEnabled: false
      upgradeVersionCheck: false

    csi:
      # Talos's kubelet root, explicit for clarity.
      kubeletRootDir: /var/lib/kubelet

    persistence:
      # Replica count for the default StorageClass Longhorn ships.
      defaultClassReplicaCount: 2
      reclaimPolicy: Delete

    service:
      ui:
        type: ClusterIP   # access via port-forward initially; ingress added later

    ingress:
      enabled: false

    defaultSettings:
      # Point Longhorn at the dedicated user volume (talos UserVolumeConfig
      # provisioned and mounted at /var/mnt/longhorn). Keeps OS/runtime data on
      # EPHEMERAL from competing with replica storage.
      defaultDataPath: /var/mnt/longhorn

      # Replica fan-out for new volumes when a workload doesn't override.
      defaultReplicaCount: 2

      # Reserve 15% of the longhorn partition as scheduling headroom (default 25%).
      # On 828 GiB that's ~124 GiB reserved — plenty for snapshot/replica overhead
      # while freeing capacity above the architecture-doc target.
      storageMinimalAvailablePercentage: "15"

      # Prefer placing one replica on the requesting node when possible — small
      # latency win for read-heavy stateful workloads on local NVMe.
      defaultDataLocality: best-effort

      # Route replica engine ↔ replica engine traffic over VLAN 25 (2.5GbE
      # storage NIC) via Multus + bridge CNI. NAD lives in this namespace;
      # the secondary interface gets an IP from the Whereabouts pool .128/28.
      # Changing this setting requires every volume to detach and reattach —
      # see docs/runbooks/longhorn-storage-network-cutover.md.
      storageNetwork: longhorn-system/storage-network

    # Backup target is managed as a BackupTarget CR (backuptarget.yaml in
    # this dir), not via defaultSettings — Longhorn 1.7+ moved backup-target
    # out of the settings space and the chart's defaultSettings.backupTarget
    # value is silently ignored on existing installs (it only populates the
    # CR at the chart's first bootstrap, which has long passed for us).
