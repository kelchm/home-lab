---
# Daily backup of every Longhorn volume in the `default` group.
# Volumes auto-join `default` when they have no other recurring-job labels;
# see docs/runbooks/longhorn-backup-restore.md for opt-out semantics.
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-daily
  namespace: longhorn-system
spec:
  cron: "0 3 * * *"        # 03:00 local, off-peak
  task: backup
  groups:
    - default
  retain: 7                # one week of daily granularity
  concurrency: 2           # bound parallelism so we don't saturate the NAS
---
# Weekly backup, Sunday morning. Independent retain count so Sunday produces
# both a daily and a weekly artifact; the weekly tier extends coverage past
# the daily window without inflating daily storage.
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-weekly
  namespace: longhorn-system
spec:
  cron: "0 4 * * 0"        # 04:00 Sunday
  task: backup
  groups:
    - default
  retain: 4                # four weeks => ~5 weeks total coverage with daily
  concurrency: 2
