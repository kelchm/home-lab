---
# Routes longhorn.home.kelch.io to the longhorn-frontend Service via the
# admin gateway. OIDC is enforced by attaching the kanidm-oidc Middleware
# as a Gateway API ExtensionRef filter (Traefik resolves
# group=traefik.io/kind=Middleware natively).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-ui
spec:
  hostnames: ["longhorn.home.kelch.io"]
  parentRefs:
    - name: gateway-admin
      namespace: network
      sectionName: https
  rules:
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: kanidm-oidc
      backendRefs:
        - name: longhorn-frontend
          port: 80
