---
# Secondary network attached to Longhorn instance-manager pods so replica
# engine ↔ replica engine traffic rides VLAN 25 (2.5GbE storage NIC).
# Whereabouts coordinates IP allocation across nodes from .111-.119
# (cluster #1 storage-pod range — see docs/architecture.md).
#
# Why bridge, not macvlan/ipvlan: Longhorn's iSCSI flow requires the
# host's iscsiadm to reach the engine's iSCSI target running inside a
# Multus-attached pod on the same node. macvlan and ipvlan L2 both block
# host-to-same-host-pod communication at the kernel level — host's
# parent-NIC stack and the slave's namespace stack are isolated even
# though they sit on the same physical port. With bridge CNI, pods get
# veth into the host's br-storage Linux bridge (configured per-node via
# Talos `machine.network.interfaces[].bridge`), and host + pods share
# one L2 broadcast domain. Same-host iscsiadm just works.
#
# `master`: br-storage is created by Talos with enp6s0 as its only
# member and carries the host's 10.32.25.X/24 IP.
#
# `isGateway: false`, `ipMasq: false`: the bridge is a pure L2 endpoint;
# no NAT, no acting as gateway. Pods use Whereabouts-assigned same-VLAN
# IPs and reach NAS / other nodes directly via the bridge → enp6s0 wire
# path. Default route stays on the pod's primary Cilium interface.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: storage-network
  namespace: longhorn-system
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br-storage",
      "isGateway": false,
      "ipMasq": false,
      "ipam": {
        "type": "whereabouts",
        "range": "10.32.25.0/24",
        "range_start": "10.32.25.111",
        "range_end": "10.32.25.119"
      }
    }
