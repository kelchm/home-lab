---
# Secondary network attached to Longhorn instance-manager pods so replica
# engine ↔ replica engine traffic rides VLAN 25 (2.5GbE storage NIC).
# Whereabouts coordinates IP allocation across nodes from .111-.119
# (cluster #1 storage-pod range — see docs/architecture.md).
#
# Why ipvlan, not macvlan: macvlan blocks host-to-pod communication on
# the same node (kernel-level limitation — host's parent NIC and macvlan
# slaves are isolated L2 endpoints; switches don't hairpin traffic back).
# That breaks Longhorn's iSCSI flow: the engine binds the iSCSI target
# on lhnet1, and the workload pod's host iscsiadm has to reach that IP
# from the same node. ipvlan L2 mode shares the host's MAC, removes the
# isolation, and lets host-to-pod-on-same-node work — while still giving
# pods independent IPs and same-VLAN reachability for replica traffic.
#
# No `gateway` — pods on this secondary only need same-VLAN reachability
# (other IM pods, nas-storage at .5). Setting a gateway risks overriding
# the pod's primary default route on Cilium.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: storage-network
  namespace: longhorn-system
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "ipvlan",
      "master": "enp6s0",
      "mode": "l2",
      "ipam": {
        "type": "whereabouts",
        "range": "10.32.25.0/24",
        "range_start": "10.32.25.111",
        "range_end": "10.32.25.119"
      }
    }
