---
# OIDC RP middleware referenced by *arr admin HTTPRoutes via ExtensionRef.
# Lives in `media` namespace because Gateway API ExtensionRef is
# LocalObjectReference — cross-namespace refs are not part of the spec.
#
# The plugin is loaded into traefik-admin (network namespace); ARR_SUITE_CLIENT_SECRET
# is set on the traefik-admin pod from the kaniop-emitted Secret in network/.
# The plugin's env-var expansion happens in-process when this Middleware is
# read at request time, so the Secret can stay namespace-isolated to network/.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kanidm-oidc
spec:
  plugin:
    traefik-oidc-auth:
      # Plugin session-state encryption key, shared across traefik-admin
      # replicas. Without this each pod generates its own random default
      # and cross-pod auth-flow handoffs fail.
      Secret: ${OIDC_SESSION_SECRET}
      # Per-OAuth2-client cookie name. Partitions session cookies by
      # OAuth2 client identity so an ops-admins session can't satisfy
      # this Middleware (which gates on arr-admins) — without a unique
      # prefix the three Middlewares sharing .home.kelch.io would
      # cross-bleed under the default TraefikOidcAuth prefix.
      CookieNamePrefix: arr-suite
      Provider:
        Url: https://auth.home.kelch.io/oauth2/openid/arr-suite
        ClientId: arr-suite
        ClientSecret: ${ARR_SUITE_CLIENT_SECRET}
        UsePkce: true
      Scopes:
        - openid
        - profile
        - email
        - groups
      Authorization:
        # Re-evaluate group membership on every request, not just at
        # session creation. Defense in depth — even if a session cookie
        # were ever cross-presented across Middlewares sharing
        # .home.kelch.io, this would reject it.
        CheckOnEveryRequest: true
        AssertClaims:
          - Name: groups
            AnyOf:
              - arr-admins@auth.home.kelch.io
      Headers:
        - Name: Remote-User
          Value: "{{ .claims.preferred_username }}"
        - Name: Remote-Email
          Value: "{{ .claims.email }}"
      SessionCookie:
        Domain: .home.kelch.io
        Secure: true
        HttpOnly: true
        SameSite: lax
        MaxAge: 43200
