---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readarr
spec:
  chartRef:
    kind: OCIRepository
    name: readarr
  interval: 1h
  values:
    controllers:
      readarr:
        strategy: Recreate
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/home-operations/readarr
              repository: ghcr.io/home-operations/readarr
              tag: 0.4.18.2805
            env:
              TZ: America/New_York
              READARR__AUTH__METHOD: External
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: &port 8787
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1041
        runAsGroup: 65537
        supplementalGroups: [65537]
        fsGroup: 1041
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 5Gi
        accessMode: ReadWriteOnce
        advancedMounts:
          readarr:
            app:
              - path: /config
      media:
        type: persistentVolumeClaim
        existingClaim: media-library
        advancedMounts:
          readarr:
            app:
              - path: /data/books
                subPath: books
              - path: /data/audiobooks
                subPath: audiobooks
              - path: /data/.downloads
                subPath: .downloads
    route:
      app:
        hostnames: ["readarr.home.kelch.io"]
        parentRefs:
          - name: gateway-admin
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: kanidm-oidc
