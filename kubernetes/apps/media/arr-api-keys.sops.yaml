# Shared *arr API keys consumed by helper apps in the media namespace
# (Unpackerr via envFrom + secretKeyRef, Recyclarr via envFrom + !env_var,
# future Seerr likewise). Bazarr does not consume env vars — its *arr
# connections are configured in the Bazarr UI; the keys live here only
# as a single source-of-truth for rotation.
#
# Populate the four placeholders, then encrypt in place:
#   sops --encrypt --in-place kubernetes/apps/media/arr-api-keys.sops.yaml
#
# Captured each *arr's API key during the inter-app wiring step:
#   <app> UI → Settings → General → API Key.
