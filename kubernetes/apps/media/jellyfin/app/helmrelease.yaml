---
# Jellyfin — media server. User-facing (not admin), runs on gateway-services
# (no kanidm-oidc middleware — Jellyfin's native auth is mature and clients
# expect it for federated logins from mobile apps / TVs). The shared media
# library is mounted readOnly — Jellyfin should never write into it; *arr
# apps own library writes.
#
# Hardware accel: AMD iGPU (Vega 11 on Ryzen 705 G4) handles VAAPI
# transcodes via /dev/dri/renderD128. Talos runs cgroup v2, where a
# bare hostPath device mount leaves open() returning EPERM despite
# crw-rw-rw- perms — kubelet only wires the cgroup-v2 device-allow
# list when a pod requests an extended resource owned by a registered
# device plugin. We use squat/generic-device-plugin (kube-system) to
# expose the render node as devic.es/dri and request it below.
# Configure HW accel in Jellyfin UI: Dashboard → Playback → Hardware
# accel = VAAPI, device = /dev/dri/renderD128.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  chartRef:
    kind: OCIRepository
    name: jellyfin
  interval: 1h
  values:
    controllers:
      jellyfin:
        strategy: Recreate
        containers:
          app:
            image:
              # renovate: datasource=docker depName=docker.io/jellyfin/jellyfin
              # home-operations doesn't ship jellyfin; using upstream official.
              repository: docker.io/jellyfin/jellyfin
              tag: 10.11.10
            env:
              TZ: America/New_York
              # Jellyfin uses this for its own self-URL in API responses,
              # mobile-app discovery, etc.
              JELLYFIN_PublishedServerUrl: https://jellyfin.home.kelch.io
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
                devic.es/dri: 1
              limits:
                memory: 4Gi
                devic.es/dri: 1
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1044
        runAsGroup: 65537
        fsGroup: 1044
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 20Gi
        accessMode: ReadWriteOnce
        advancedMounts:
          jellyfin:
            app:
              - path: /config
      # Media library — readOnly: Jellyfin should never write into the
      # library (*arr apps own library writes). Defense-in-depth.
      media:
        type: persistentVolumeClaim
        existingClaim: media-library
        advancedMounts:
          jellyfin:
            app:
              - path: /data/tv
                subPath: tv
                readOnly: true
              - path: /data/movies
                subPath: movies
                readOnly: true
              - path: /data/music
                subPath: music
                readOnly: true
              - path: /data/books
                subPath: books
                readOnly: true
              - path: /data/audiobooks
                subPath: audiobooks
                readOnly: true
      # Transcoding scratch space — Jellyfin writes intermediate files
      # here during live transcodes. Keep on local node fs (not NFS) for
      # speed. sizeLimit caps worst-case usage to prevent node-disk
      # pressure if a transcode runs away; ~5 GB per 1080p stream buffer,
      # 50 GiB allows ~10 concurrent without eviction risk.
      transcodes:
        type: emptyDir
        sizeLimit: 50Gi
        advancedMounts:
          jellyfin:
            app:
              - path: /transcodes
    route:
      app:
        hostnames: ["jellyfin.home.kelch.io"]
        parentRefs:
          - name: gateway-services
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
