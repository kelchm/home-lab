---
# Jellyfin — media server. User-facing (not admin), runs on gateway-services
# (no kanidm-oidc middleware — Jellyfin's native auth is mature and clients
# expect it for federated logins from mobile apps / TVs). The shared media
# library is mounted readOnly — Jellyfin should never write into it; *arr
# apps own library writes.
#
# Hardware accel: /dev/dri/renderD128 is crw-rw-rw- on all 3 Talos nodes,
# so no supplementalGroups for video/render needed; the hostPath mount is
# sufficient. AMD iGPU (Vega 11 on Ryzen 705 G4) handles VAAPI transcodes.
# Configure HW accel in Jellyfin UI: Dashboard → Playback → Hardware accel
# = VAAPI, device = /dev/dri/renderD128.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  chartRef:
    kind: OCIRepository
    name: jellyfin
  interval: 1h
  values:
    controllers:
      jellyfin:
        strategy: Recreate
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/home-operations/jellyfin
              repository: ghcr.io/home-operations/jellyfin
              tag: 10.11.8
            env:
              TZ: America/New_York
              # Jellyfin uses this for its own self-URL in API responses,
              # mobile-app discovery, etc.
              JELLYFIN_PublishedServerUrl: https://jellyfin.home.kelch.io
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                memory: 4Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1044
        runAsGroup: 65537
        supplementalGroups: [65537]
        fsGroup: 1044
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 20Gi
        accessMode: ReadWriteOnce
        advancedMounts:
          jellyfin:
            app:
              - path: /config
      # Media library — readOnly: Jellyfin should never write into the
      # library (*arr apps own library writes). Defense-in-depth.
      media:
        type: persistentVolumeClaim
        existingClaim: media-library
        advancedMounts:
          jellyfin:
            app:
              - path: /data/tv
                subPath: tv
                readOnly: true
              - path: /data/movies
                subPath: movies
                readOnly: true
              - path: /data/music
                subPath: music
                readOnly: true
              - path: /data/books
                subPath: books
                readOnly: true
              - path: /data/audiobooks
                subPath: audiobooks
                readOnly: true
      # AMD iGPU access for VAAPI hardware transcoding. /dev/dri/renderD128
      # is world-rw on Talos (no group membership needed). card0 is
      # root-only and not required for software-render fallback or VAAPI.
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        advancedMounts:
          jellyfin:
            app:
              - path: /dev/dri
      # Transcoding scratch space — Jellyfin writes intermediate files
      # here during live transcodes. Keep on local node fs (not NFS) for
      # speed; size depends on concurrent streams (~5 GB per 1080p stream
      # buffer is plenty).
      transcodes:
        type: emptyDir
        advancedMounts:
          jellyfin:
            app:
              - path: /transcodes
    route:
      app:
        hostnames: ["jellyfin.home.kelch.io"]
        parentRefs:
          - name: gateway-services
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
