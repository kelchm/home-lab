---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin
spec:
  dependsOn:
    - name: media-storage
    - name: generic-device-plugin   # advertises squat.ai/dri for VAAPI transcoding
      namespace: kube-system
  interval: 1h
  path: ./kubernetes/apps/media/jellyfin/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: true
