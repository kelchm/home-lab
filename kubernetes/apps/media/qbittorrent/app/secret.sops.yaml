# Populate the four placeholder values, then SOPS-encrypt in place:
#   sops --encrypt --in-place kubernetes/apps/media/qbittorrent/app/secret.sops.yaml
#
# WIREGUARD_PRIVATE_KEY / WIREGUARD_ADDRESSES:
#   ProtonVPN dashboard → Downloads → WireGuard configuration → generate a
#   config with P2P/Plus enabled. Copy the `PrivateKey` and `Address` fields
#   from the resulting .conf file. The dashboard config tied to a server
#   country is fine; gluetun's SERVER_COUNTRIES filter still applies on top.
#
# WEBUI_PASSWORD_PBKDF2:
#   qBittorrent's PBKDF2-HMAC-SHA-512 (100k iter, 64-byte output), formatted
#   as @ByteArray(base64_salt:base64_hash). Generate with:
#     python3 -c '
#     import base64, hashlib, os, getpass
#     pw = getpass.getpass("qB password: ").encode()
#     salt = os.urandom(16)
#     h = hashlib.pbkdf2_hmac("sha512", pw, salt, 100000)
#     print(f"@ByteArray({base64.b64encode(salt).decode()}:{base64.b64encode(h).decode()})")
#     '
#   This is a bootstrap credential only — used to log in once via
#   kubectl port-forward, configure the IP-subnet auth bypass (pod CIDR
#   10.42.0.0/16), and save. After that, native qB auth is unreachable
#   from outside (OIDC-gated by Traefik) and unused inside (whitelist
#   bypass). The plaintext value never matters again post-setup.
