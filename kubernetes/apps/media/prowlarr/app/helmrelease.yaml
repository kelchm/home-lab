---
# Prowlarr — indexer aggregator. No media mount; only talks to *arr APIs and
# external indexers. First *arr deploy; validates the per-app skeleton +
# kanidm-oidc Middleware cross-namespace ExtensionRef end-to-end.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
spec:
  chartRef:
    kind: OCIRepository
    name: prowlarr
  interval: 1h
  values:
    controllers:
      prowlarr:
        strategy: Recreate
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/home-operations/prowlarr
              repository: ghcr.io/home-operations/prowlarr
              tag: 2.5.0.5422
            env:
              TZ: America/New_York
              # Disables app-level auth; OIDC at the edge is the only gate.
              PROWLARR__AUTH__METHOD: External
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: &port 9696
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        # home-operations/prowlarr image's USER is `nobody:nogroup` (65534).
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 5Gi
        accessMode: ReadWriteOnce
        advancedMounts:
          prowlarr:
            app:
              - path: /config
    route:
      app:
        hostnames: ["prowlarr.home.kelch.io"]
        parentRefs:
          - name: gateway-admin
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: kanidm-oidc
