---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: media-storage
spec:
  dependsOn:
    - name: csi-driver-nfs
      namespace: kube-system
  interval: 1h
  path: ./kubernetes/apps/media/storage/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: true
