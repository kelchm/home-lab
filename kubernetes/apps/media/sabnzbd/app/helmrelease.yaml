---
# SABnzbd — usenet downloader. First NFS-writing app; exercises per-app UID
# (1037), shared media group (65537), and the setgid 2775 directory layout
# from the Synology bootstrap. No VPN — usenet doesn't expose torrent-style
# peer identity, so the cluster nodes hit providers directly via the storage
# NIC's egress path.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sabnzbd
spec:
  chartRef:
    kind: OCIRepository
    name: sabnzbd
  interval: 1h
  values:
    controllers:
      sabnzbd:
        strategy: Recreate
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/home-operations/sabnzbd
              repository: ghcr.io/home-operations/sabnzbd
              tag: 5.0.4
            env:
              TZ: America/New_York
              # The home-operations entrypoint maps this to host_whitelist in
              # sabnzbd.ini and auto-prepends ${HOSTNAME} (the pod name). Probes
              # still use Host: localhost which SABnzbd always allows.
              SABNZBD__HOST_WHITELIST_ENTRIES: sabnzbd.home.kelch.io
            probes:
              # SABnzbd enforces host_whitelist on every request. kubelet probes
              # send the pod IP as Host by default, which would be rejected.
              # Force Host: localhost (SABnzbd always allows it) and use the
              # unauthenticated /api?mode=version endpoint.
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api?mode=version&output=json
                    port: &port 8080
                    httpHeaders:
                      - name: Host
                        value: localhost
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1037
        runAsGroup: 65537
        supplementalGroups: [65537]
        fsGroup: 1037
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 5Gi
        accessMode: ReadWriteOnce
        advancedMounts:
          sabnzbd:
            app:
              - path: /config
      media:
        type: persistentVolumeClaim
        existingClaim: media-library
        advancedMounts:
          sabnzbd:
            app:
              - path: /data/.downloads/usenet
                subPath: .downloads/usenet
    route:
      app:
        hostnames: ["sabnzbd.home.kelch.io"]
        parentRefs:
          - name: gateway-admin
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: kanidm-oidc
