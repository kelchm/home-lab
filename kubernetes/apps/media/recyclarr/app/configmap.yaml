---
# Recyclarr v8 sync config — TRaSH Guides quality profiles, custom formats,
# and media naming for Sonarr + Radarr.
#
# media_naming uses the jellyfin-* TRaSH keys so folder/file names embed
# tvdbid/tmdbid for reliable Jellyfin library matching.
#
# To regenerate fresh templates from upstream when curating future changes:
#   kubectl -n media run rcfg --rm -i --restart=Never \
#     --image=ghcr.io/recyclarr/recyclarr:8.6.0 -- \
#     sh -c "recyclarr config create -t web-1080p -t web-2160p \
#                                    -t hd-bluray-web -t uhd-bluray-web \
#            > /tmp/t && cat /tmp/t"
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
data:
  recyclarr.yml: |
    # yaml-language-server: $schema=https://schemas.recyclarr.dev/v8/config-schema.json
    sonarr:
      sonarr_main:
        base_url: !env_var SONARR_BASE_URL
        api_key: !env_var SONARR_API_KEY
        quality_definition:
          type: series
        quality_profiles:
          - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p
            reset_unmatched_scores:
              enabled: true
          - trash_id: d1498e7d189fbe6c7110ceaabb7473e6  # WEB-2160p
            reset_unmatched_scores:
              enabled: true
        custom_format_groups:
          add:
            - trash_id: 158188097a58d7687dee647e04af0da3  # [Optional] Golden Rule HD
              select:
                - 47435ece6b99a0b477caf360e79ba0bb  # x265 (HD)
            - trash_id: e3f37512790f00d0e89e54fe5e790d1c  # [Optional] Golden Rule UHD
              select:
                - 9b64dff695c2115facf1b6ea59c9bd07  # x265 (no HDR/DV)
            - trash_id: 85fae4a2294965b75710ef2989c850eb  # [Streaming Services] HD/UHD boost
            - trash_id: e0b2774083df4265f25c9e5bc6c80940  # [HDR Formats] DV Boost
            - trash_id: 7d366c213e5c23a052b157356fac1921  # [HDR Formats] HDR10+ Boost
            - trash_id: f4a0410a1df109a66d6e47dcadcce014  # [Optional] Miscellaneous
              select:
                - d7c747094a7c65f4c2de083c24899e8b  # FreeLeech
                - 5ab46ff851b76c337e13e81a4353875f  # INTERNAL
            - trash_id: 59c3af66780d08332fdc64e68297098f  # [Unwanted] Unwanted Formats
              select:
                - 15a05bc7c1a36e2b57fd628f8977e2fc  # AV1
                - 32b367365729d530ca1c124a0b180c64  # Bad Dual Groups
                - 85c61753df5da1fb2aab6f2a47426b09  # BR-DISK
                - 6f808933a71bd9666531610cb8c059cc  # BR-DISK (BTN)
                - fbcb31d8dabd2a319072b84fc0b7249c  # Extras
                - 9c11cd3f07101cdba90a2d81cf0e56b4  # LQ
                - e2315f990da2e2cbfc9fa5b7a6fcfe48  # LQ (Release Title)
                - 23297a736ca77c0fc8e70f8edd7ee56c  # Upscaled
        media_naming:
          series: jellyfin-tvdb
          season: default
          episodes:
            rename: true
            standard: default
            daily: default
            anime: default
    radarr:
      radarr_main:
        base_url: !env_var RADARR_BASE_URL
        api_key: !env_var RADARR_API_KEY
        quality_definition:
          type: movie
        quality_profiles:
          - trash_id: d1d67249d3890e49bc12e275d989a7e9  # HD Bluray + WEB
            reset_unmatched_scores:
              enabled: true
          - trash_id: 64fb5f9858489bdac2af690e27c8f42f  # UHD Bluray + WEB
            reset_unmatched_scores:
              enabled: true
        custom_format_groups:
          add:
            - trash_id: f8bf8eab4617f12dfdbd16303d8da245  # [Optional] Golden Rule HD
              select:
                - dc98083864ea246d05a42df0d05f81cc  # x265 (HD)
            - trash_id: ff204bbcecdd487d1cefcefdbf0c278d  # [Optional] Golden Rule UHD
              select:
                - 839bea857ed2c0a8e084f3cbdbd65ecb  # x265 (no HDR/DV)
            - trash_id: 1616617ab3a14397a2b2321bcbda44d1  # [HDR Formats] DV Boost
            - trash_id: b29413a7487478fe98228ce79e5689e4  # [HDR Formats] HDR10+ Boost
            - trash_id: f4f1474b963b24cf983455743aa9906c  # [Optional] Movie Versions
              select:
                - eca37840c13c6ef2dd0262b141a5482f  # 4K Remaster
                - e0c07d59beb37348e975a930d5e50319  # Criterion Collection
                - 0f12c086e289cf966fa5948eac571f44  # Hybrid
                - eecf3a857724171f968a66cb5719e152  # IMAX
                - 9f6cbff8cfe4ebbc1bde14c7b7bec0de  # IMAX Enhanced
                - 9d27d9d2181838f76dee150882bdc58c  # Masters of Cinema
                - 09d9dd29a0fc958f9796e65c2a8864b4  # Open Matte
                - 570bc9ebecd92723d2d21500f4be314c  # Remaster
                - 957d0f44b592285f26449575e8b1167e  # Special Edition
                - e9001909a4c88013a359d0b9920d7bea  # Theatrical Cut
                - db9b4c4b53d312a3ca5f1378f6440fc9  # Vinegar Syndrome
            - trash_id: 9337080378236ce4c0b183e35790d2a7  # [Optional] Miscellaneous
              select:
                - 0d91270a7255a1e388fa85e959f359d8  # FreeLeech
                - 182fa1c42a2468f8488e6dcf75a81b81  # INTERNAL
            - trash_id: a3ac6af01d78e4f21fcb75f601ac96df  # [Unwanted] Unwanted Formats
              select:
                - b8cd450cbfa689c0259a01d9e29ba3d6  # 3D
                - cae4ca30163749b891686f95532519bd  # AV1
                - b6832f586342ef70d9c128d40c07b872  # Bad Dual Groups
                - cc444569854e9de0b084ab2b8b1532b2  # Black and White Editions
                - ed38b889b31be83fda192888e2286d83  # BR-DISK
                - 0a3f082873eb454bde444150b70253cc  # Extras
                - e6886871085226c3da1830830146846c  # Generated Dynamic HDR
                - 90a6f9a284dff5103f6346090e6280c8  # LQ
                - e204b80c87be9497a8a6eaff48f72905  # LQ (Release Title)
                - 712d74cd88bceb883ee32f773656b1f5  # Sing-Along Versions
                - bfd8eb01832d646a0a89c4deb46f8564  # Upscaled
        media_naming:
          folder: jellyfin-tmdb
          movie:
            rename: true
            standard: jellyfin-tmdb
