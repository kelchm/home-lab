---
# Recyclarr — CronJob that syncs TRaSH-Guides quality profiles + custom
# formats into Sonarr + Radarr daily via their APIs. No NFS access; no
# Web UI. Config lives in the recyclarr-config ConfigMap (mounted at
# /config/recyclarr.yml); API keys come from arr-api-keys Secret via env.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recyclarr
spec:
  chartRef:
    kind: OCIRepository
    name: recyclarr
  interval: 1h
  values:
    controllers:
      recyclarr:
        type: cronjob
        cronjob:
          schedule: "0 3 * * *"
          timeZone: America/New_York
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 5
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/recyclarr/recyclarr
              repository: ghcr.io/recyclarr/recyclarr
              tag: 8.6.0
            args: ["sync"]
            env:
              TZ: America/New_York
              SONARR_BASE_URL: http://sonarr.media.svc.cluster.local:8989
              RADARR_BASE_URL: http://radarr.media.svc.cluster.local:7878
              SONARR_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: arr-api-keys
                    key: SONARR_API_KEY
              RADARR_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: arr-api-keys
                    key: RADARR_API_KEY
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    persistence:
      config:
        type: configMap
        name: recyclarr-config
        advancedMounts:
          recyclarr:
            app:
              - path: /config/recyclarr.yml
                subPath: recyclarr.yml
                readOnly: true
      cache:
        type: emptyDir
        advancedMounts:
          recyclarr:
            app:
              - path: /config/cache
