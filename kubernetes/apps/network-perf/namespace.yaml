---
apiVersion: v1
kind: Namespace
metadata:
  name: network-perf
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    # iperf3 runs as a DaemonSet with hostNetwork to measure underlay
    # NIC throughput (not the CNI overlay). Talos PSA enforces strict
    # defaults outside kube-system, so the namespace needs the
    # privileged label for hostNetwork pods to admit.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
