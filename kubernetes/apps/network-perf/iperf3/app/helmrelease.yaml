---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: iperf3
spec:
  chartRef:
    kind: OCIRepository
    name: iperf3
  interval: 1h
  values:
    controllers:
      iperf3:
        type: daemonset
        containers:
          app:
            image:
              repository: networkstatic/iperf3
              tag: latest
            args:
              - -s
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 5201
                  initialDelaySeconds: 5
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 5201
                  initialDelaySeconds: 2
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 32Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
