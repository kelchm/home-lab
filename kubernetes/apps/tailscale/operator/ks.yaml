---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale-operator
spec:
  interval: 1h
  path: ./kubernetes/apps/tailscale/operator/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: tailscale
  # wait: true so tailscale-connector's dependsOn gates on the HelmRelease being
  # actually rolled out (i.e., the Connector CRD installed by the chart).
  wait: true
