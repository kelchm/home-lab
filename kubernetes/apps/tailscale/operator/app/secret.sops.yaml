# Tailscale operator OAuth client credentials. The operator authenticates to the
# tailnet with these to mint auth keys and enroll the operator + proxy devices.
#
# Create the OAuth client at https://login.tailscale.com/admin/settings/oauth with
# scopes "Devices Core" (write) and "Auth Keys" (write), tagged tag:k8s-operator.
# Full tailnet-side setup: kubernetes/apps/tailscale/README.md.
#
# Populate the two placeholders, then encrypt in place:
#   sops --encrypt --in-place kubernetes/apps/tailscale/operator/app/secret.sops.yaml
