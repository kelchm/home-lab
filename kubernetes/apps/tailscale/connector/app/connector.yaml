---
# Subnet router advertising the home LAN/VLAN/LB ranges into the tailnet.
# Cluster-scoped CR; the operator renders it into a tailscaled StatefulSet.
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: lan-subnet-router
spec:
  hostname: lan-subnet-router
  # The operator must own tag:k8s (autoApprovers keys these routes to it).
  tags:
    - "tag:k8s"
  subnetRouter:
    advertiseRoutes:
      - "10.32.1.0/24" # VLAN 1 — UniFi controller/gateway admin
      - "10.32.10.0/24" # VLAN 10 — Main: trusted clients / admin devices
      - "10.32.20.0/24" # VLAN 20 — Lab Infra: NAS, switches, APs
      - "10.32.30.0/24" # VLAN 30 — Lab Prod: talosctl, kube-API, nodes
      - "10.32.130.0/24" # admin-prod LB — Traefik admin + k8s-gateway DNS
      - "10.32.140.0/24" # services-prod LB — household apps + *.home.kelch.io
