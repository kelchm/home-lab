---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./certificate.yaml
  - ./kanidm.yaml
  - ./group-arr-admins.yaml
  - ./group-ops-admins.yaml
  - ./person-kelchm.yaml
  - ./httproute.yaml
  - ./serverstransport.yaml
  - ./traefikservice.yaml
  - ./networkpolicy.yaml

# Generates the kanidm-theme ConfigMap from the standalone override.css.
# Hash suffix disabled so kanidm.yaml's fixed configMap reference resolves;
# Stakater Reloader (annotation on the StatefulSet) handles roll-on-change.
configMapGenerator:
  - name: kanidm-theme
    files:
      - override.css
      - style.js
generatorOptions:
  disableNameSuffixHash: true
