---
# Kanidm IdP cluster. The kaniop operator (sibling app in this namespace)
# renders this CR into a StatefulSet + Service.
apiVersion: kaniop.rs/v1beta1
kind: Kanidm
metadata:
  name: kanidm
spec:
  domain: auth.home.kelch.io
  origin: https://auth.home.kelch.io

  # Shown as the login heading and navbar brand. Without this kaniop defaults
  # to "Kanidm <hostname>".
  domainAppearance:
    displayName: auth.home.kelch.io

  # renovate: datasource=docker depName=docker.io/kanidm/server
  image: kanidm/server:1.10.4

  logLevel: info

  # cert-manager-managed Secret produced by certificate.yaml. cert-manager owns
  # cert lifecycle (DNS01 ACME, renewal); kaniop just mounts the Secret.
  tlsSecretName: auth-home-kelch-io-tls

  # Exposes port 3636 (LDAPS) on the kaniop-generated Service for in-cluster
  # LDAP bind from RPs that don't speak OIDC.
  ldapPortName: ldaps

  env:
    # Trust X-Forwarded-For so audit logs and per-IP rate limits see real
    # client IPs from Traefik. The legacy V1 boolean = trust-all-sources;
    # the actual trust boundary is networkpolicy.yaml restricting :8443
    # ingress to Traefik pods.
    - name: KANIDM_TRUST_X_FORWARD_FOR
      value: "true"
    # Daily transactionally-consistent SQLite dump to /data/backups/. Cron
    # is interpreted in container TZ (UTC). 05:00 UTC = 01:00 EDT, two
    # hours before Longhorn's 07:00 UTC daily PVC backup picks up both the
    # live DB and the latest dump.
    - name: KANIDM_ONLINE_BACKUP_SCHEDULE
      value: "0 5 * * *"
    - name: KANIDM_ONLINE_BACKUP_VERSIONS
      value: "7"

  replicaGroups:
    - name: default
      replicas: 3
      role: write_replica
      primaryNode: true
      # Stakater Reloader (kube-system/reloader) restarts the pod when the
      # referenced TLS Secret rotates. Kanidm reads its cert at startup only;
      # without this annotation the pod would serve the old cert past
      # cert-manager's renewal until something else restarted it.
      statefulSetAnnotations:
        reloader.stakater.com/auto: "true"
      resources:
        requests:
          cpu: 10m
          memory: 90Mi
        limits:
          memory: 2Gi
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              kanidm.kaniop.rs/cluster: kanidm
              kanidm.kaniop.rs/replica-group: default
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule

  storage:
    volumeClaimTemplate:
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn
        resources:
          requests:
            storage: 2Gi

  # UID/GID 389 matches the kanidm/server image's docker-compose convention.
  securityContext:
    runAsNonRoot: true
    runAsUser: 389
    runAsGroup: 389
    fsGroup: 389
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

  # Custom web-UI theme. Two ConfigMaps (generated in kustomization.yaml), served
  # by kanidm out of /pkg. kaniop appends these to the StatefulSet; the mounts
  # land on the kanidm container. The StatefulSet's reloader.stakater.com/auto
  # annotation rolls the pods when either ConfigMap changes.
  #  - kanidm-theme: override.css + style.js, subPath-mounted onto individual
  #    files (subPath mounts don't live-update, hence Reloader).
  #  - kanidm-icons: dir-mounted at /hpkg/icons, so every SVG is served at
  #    /pkg/icons/<name> — the brand logos (referenced by override.css) and the
  #    portal tiles (fetched by kaniop via image.url on each OAuth2 client).
  volumes:
    - name: theme
      configMap:
        name: kanidm-theme
    - name: theme-icons
      configMap:
        name: kanidm-icons
  volumeMounts:
    - name: theme
      mountPath: /hpkg/override.css
      subPath: override.css
      readOnly: true
    # style.js overrides kanidm's to keep <meta theme-color> in sync per mode
    # (mobile browser chrome). Mirrors upstream's data-bs-theme logic — re-check
    # on kanidm upgrades.
    - name: theme
      mountPath: /hpkg/style.js
      subPath: style.js
      readOnly: true
    - name: theme-icons
      mountPath: /hpkg/icons
      readOnly: true

  # Empty selector = match all namespaces. Required so OAuth2 client CRs can
  # live alongside the consumer apps that depend on them.
  oauth2ClientNamespaceSelector: {}
  groupNamespaceSelector: {}
  personNamespaceSelector: {}
