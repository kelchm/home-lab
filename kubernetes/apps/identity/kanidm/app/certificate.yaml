---
# Public TLS for auth.home.kelch.io. kaniop mounts this Secret into the Kanidm
# pod as TLS material (per spec.tlsSecretName on the Kanidm CR). Kanidm refuses
# to start without HTTPS, and clients hit the pod cert directly because the
# Traefik HTTPRoute backend connection is HTTPS (BackendTLSPolicy validates
# against the same public chain).
#
# DNS01 Cloudflare via the existing letsencrypt-production ClusterIssuer (same
# flow as the *.home.kelch.io wildcard cert in the network namespace).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: auth-home-kelch-io
spec:
  dnsNames:
    - auth.home.kelch.io
  # letsencrypt-production ClusterIssuer uses the LE shortlived ACME profile,
  # which issues ~7-day certs. cert-manager handles renewal automatically.
  duration: 160h
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
  secretName: auth-home-kelch-io-tls
  usages:
    # `key encipherment` invalid for ECDSA per RFC 5480 (only RSA certs use
    # the key-transport keyUsage).
    - digital signature
    - server auth
