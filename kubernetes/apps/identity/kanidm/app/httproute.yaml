---
# Routes auth.home.kelch.io -> kanidm Service. Backend connection is HTTPS
# (validated by BackendTLSPolicy); a plain-HTTP backend would break Kanidm's
# HTTPS-only listener.
#
# Lives on gateway-services so client VLANs can complete OIDC redirects from
# OIDC RPs; gateway-admin (VLAN-10 only) shares the same cert + DNS path.
#
# No auth Middleware attached — Kanidm is the auth source itself; gating it
# would create a chicken-and-egg.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kanidm
spec:
  hostnames: ["auth.home.kelch.io"]
  parentRefs:
    - name: gateway-services
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: kanidm
          port: 8443
