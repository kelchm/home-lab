---
# Routes auth.home.kelch.io -> kanidm via a TraefikService that adds sticky-
# cookie LB across replicas (kanidm's multi-step auth flow signs per-pod
# state, so a single login must pin to one backend). Backend TLS + cert
# validation come from the ServersTransport that the TraefikService refers to.
#
# Lives on gateway-services so client VLANs can complete OIDC redirects from
# OIDC RPs; gateway-admin (VLAN-10 only) shares the same cert + DNS path.
#
# No auth Middleware attached — Kanidm is the auth source itself; gating it
# would create a chicken-and-egg.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kanidm
spec:
  hostnames: ["auth.home.kelch.io"]
  parentRefs:
    - name: gateway-services
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - group: traefik.io
          kind: TraefikService
          name: kanidm
