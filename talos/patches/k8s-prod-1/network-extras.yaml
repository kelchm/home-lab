# Strategic merge replaces the interfaces list atomically, so we must
# restate the primary interface here (mirrors talconfig.yaml.j2 output)
# alongside the secondary interfaces we want to add.
#
# `physical: true` on the selector is critical: VLAN sub-interfaces inherit
# the parent's MAC. Without it, the selector matches the physical NIC AND any
# VLAN sub-interfaces of it, causing Talos to recursively apply the `vlans:`
# block to each match and stack more sub-interfaces on every reconcile.
machine:
  network:
    interfaces:
      # 1GbE primary on VLAN 30 (native/untagged). VIP for K8s API at .8.
      # VLAN 40 subinterface carries a node IP so Cilium's kube-proxy-replacement
      # TC ingress programs attach to it; without a connected route on the
      # announcement interface, inbound LB traffic to 10.32.40.0/24 isn't
      # intercepted before kernel routing and ends up bouncing out the default
      # route. No default route on this sub-interface — VLAN 30 stays primary.
      - deviceSelector:
          hardwareAddr: "80:e8:2c:22:6a:33"
          physical: true
        dhcp: false
        addresses:
          - "10.32.30.11/24"
        routes:
          - gateway: "10.32.30.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.32.30.8"
        vlans:
          - vlanId: 40
            mtu: 1500
            addresses:
              - "10.32.40.11/24"
      # 2.5GbE storage NIC on VLAN 25 — now a bridge slave (no IP of its own).
      # IP moves to br-storage below so the host shares an L2 broadcast domain
      # with Multus-attached pods (same-host iscsiadm reachability — macvlan
      # and ipvlan both have host-to-same-host-pod isolation issues; bridge
      # does not).
      - deviceSelector:
          hardwareAddr: "00:e0:4c:68:04:d3"
          physical: true
        dhcp: false
        mtu: 1500
      # Linux bridge owning the storage VLAN IP, with enp6s0 as its only slave.
      # Multus storage-network NAD uses bridge CNI with this bridge; pods get
      # veth into br-storage and share L2 with the host.
      - interface: br-storage
        bridge:
          stp:
            enabled: false
          interfaces:
            - enp6s0
        addresses:
          - "10.32.25.11/24"
        mtu: 1500
        dhcp: false
