machine:
  kubelet:
    extraConfig:
      serializeImagePulls: false
      # Register every node with NoSchedule taints that hold workload pods
      # off until both CNIs are actually ready. Without this, there's a
      # boot race: Cilium drops 05-cilium.conflist and kubelet goes Ready
      # while Multus is still in its install step (00-multus.conf not yet
      # written). Pods admitted in that window come up Cilium-only — their
      # Multus annotations are ignored, no secondary networks attach, and
      # Longhorn engine↔replica connectivity over VLAN 25 silently breaks.
      # Once seen with a node-1 power-cycle (2026-05-06): VictoriaLogs
      # faulted, four other PVCs went degraded, manual pod-restart needed.
      #
      # Removal:
      #   - node.cilium.io/agent-not-ready: removed by cilium-operator
      #     once the local cilium-agent is healthy (built-in Cilium).
      #   - node.multus.io/not-ready: removed by the cni-ready-untaint DS
      #     in kube-system once /etc/cni/net.d/00-multus.conf exists.
      #
      # Lives under extraConfig (kubelet's KubeletConfiguration object),
      # not directly under machine.kubelet — Talos doesn't expose this as
      # a top-level field.
      registerWithTaints:
        - key: node.cilium.io/agent-not-ready
          value: "true"
          effect: NoSchedule
        - key: node.multus.io/not-ready
          value: "true"
          effect: NoSchedule
      # Unsafe sysctls that pods are allowed to request via
      # spec.securityContext.sysctls. Per-pod-netns; setting host-wide
      # via machine.sysctls doesn't help because each pod gets its own
      # net namespace where the value resets to default.
      allowedUnsafeSysctls:
        - "net.ipv4.conf.all.src_valid_mark"   # WireGuard | qBittorrent+Gluetun
    nodeIP:
      validSubnets:
        - 10.32.30.0/24
