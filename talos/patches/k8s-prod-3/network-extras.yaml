# See k8s-prod-1/network-extras.yaml for context — same shape, different IPs.
machine:
  network:
    interfaces:
      - deviceSelector:
          hardwareAddr: "b0:0c:d1:59:da:2b"
          physical: true
        dhcp: false
        addresses:
          - "10.32.30.13/24"
        routes:
          - gateway: "10.32.30.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.32.30.8"
        vlans:
          - vlanId: 40
            mtu: 1500
            addresses:
              - "10.32.40.13/24"
      # 2.5GbE storage NIC — bridge slave (no IP).
      - deviceSelector:
          hardwareAddr: "00:e0:4c:68:05:04"
          physical: true
        dhcp: false
        mtu: 1500
      # Linux bridge owning the storage VLAN IP.
      - interface: br-storage
        bridge:
          stp:
            enabled: false
          interfaces:
            - enp6s0
        addresses:
          - "10.32.25.13/24"
        mtu: 1500
        dhcp: false
