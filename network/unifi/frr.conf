! UniFi gateway BGP config — peers with Cilium BGP control plane on Talos prod cluster.
!
! AS layout:
!   65000  UniFi gateway (this device)
!   65020  k8s-prod cluster (all 3 Talos nodes share an ASN)
!
! Inbound prefix policy: accept only /32s within admin-prod (10.32.130.0/24)
! and services-prod (10.32.140.0/24). Reject everything else, including the
! covering /24s — Cilium is expected to advertise allocated VIPs as exact /32s.
!
! shared-prod (10.32.150.0/24) is intentionally absent: no current tenant.
! When AdGuard or another shared-VLAN service lands, add it to TALOS-IN.
!
! Replace ${BGP_PASSWORD} with the shared MD5 password before applying.
! Plaintext lives sops-encrypted at
!   kubernetes/apps/kube-system/cilium/app/bgp-secret.sops.yaml
! Decrypt with: sops --decrypt <path> | yq '.stringData.password'
router bgp 65000
 bgp router-id 10.32.30.1
 no bgp default ipv4-unicast
 no bgp ebgp-requires-policy
 !
 neighbor TALOS peer-group
 neighbor TALOS remote-as 65020
 neighbor TALOS password ${BGP_PASSWORD}
 neighbor TALOS timers 3 9
 neighbor TALOS timers connect 5
 !
 neighbor 10.32.30.11 peer-group TALOS
 neighbor 10.32.30.11 description k8s-prod-1
 neighbor 10.32.30.12 peer-group TALOS
 neighbor 10.32.30.12 description k8s-prod-2
 neighbor 10.32.30.13 peer-group TALOS
 neighbor 10.32.30.13 description k8s-prod-3
 !
 address-family ipv4 unicast
  neighbor TALOS activate
  neighbor TALOS soft-reconfiguration inbound
  neighbor TALOS prefix-list TALOS-IN in
  neighbor TALOS prefix-list TALOS-OUT out
  neighbor TALOS maximum-prefix 64
 exit-address-family
!
ip prefix-list TALOS-IN seq 10 permit 10.32.130.0/24 ge 32 le 32
ip prefix-list TALOS-IN seq 20 permit 10.32.140.0/24 ge 32 le 32
ip prefix-list TALOS-IN seq 100 deny any
!
ip prefix-list TALOS-OUT seq 10 deny any
!
